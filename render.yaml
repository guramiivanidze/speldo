# Render Blueprint - https://render.com/docs/blueprint-spec
# This file defines all services needed for the Splendor game

services:
  # ============================================
  # BACKEND - Django + Channels (WebSocket)
  # ============================================
  - type: web
    name: speldo-backend
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT splendor.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: FRONTEND_URL
        value: https://speldo-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: speldo-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Cloudinary for image storage (set these in Render dashboard)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false  # Set manually in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Redis for WebSocket scaling (Upstash or other Redis provider)
      - key: REDIS_URL
        sync: false  # Set manually in Render dashboard (e.g. Upstash Redis URL)

  # ============================================
  # FRONTEND - Next.js
  # ============================================
  - type: web
    name: speldo-frontend
    runtime: node
    region: oregon
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://speldo-backend.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://speldo-backend.onrender.com
      - key: NODE_VERSION
        value: "20"

# ============================================
# DATABASE - PostgreSQL
# ============================================
databases:
  - name: speldo-db
    region: oregon
    plan: starter
    databaseName: speldo
    user: speldo
